name: my_ewesome_app
description: "Salon Customer App - Browse salons, book services, and manage appointments."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^17.3.0

  # Network
  dio: ^5.8.0+1

  # Dependency Injection
  get_it: ^9.2.1

  # Local Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  shadcn_ui: ^0.55.0

  # Firebase
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_messaging: ^16.4.1
  firebase_database: ^12.1.2
  firebase_auth: ^6.2.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
